data:
  dataset_folder: "dataset/"
  images_folder: "dataset/images/"
  train_data: "dataset/data_train.csv"
  eval_data: "dataset/data_eval.csv"
  answer_space: "dataset/answer_space.txt"

model:
  text: "bert-base-uncased"        # start with this, safest choice
  image: "google/vit-base-patch16-224-in21k"   # start with ViT

training:
  output_dir: "output/"
  num_train_epochs: 20             # 20 is good for your dataset size
  batch_size: 32
  learning_rate: 5e-5
  save_steps: 100
  eval_steps: 100
  logging_steps: 50
  seed: 42
